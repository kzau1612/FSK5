<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bai tap</title>
    <!-- reset css -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <a href="#!" class="header__logo">
            <img src="./img/logo.svg" alt="logo" />
          </a>

          <div class="header-right">
            <nav class="nav">
              <ul class="nav__list">
                <li class="nav__item nav__item--active">
                  <a href="#!" class="nav__link">Home</a>
                </li>
                <li class="nav__item">
                  <a href="#!" class="nav__link">Menu</a>
                </li>
                <li class="nav__item">
                  <a href="#!" class="nav__link">Service</a>
                </li>
                <li class="nav__item">
                  <a href="#!" class="nav__link">Shop</a>
                </li>
              </ul>
            </nav>

            <form class="search-form">
              <span class="form-img-left">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  fill="none"
                  viewBox="0 0 16 16"
                >
                  <path
                    fill="#8B8B8B"
                    d="M15.212 14.573l-3.808-3.96A6.44 6.44 0 0012.92 6.46 6.467 6.467 0 006.46 0 6.467 6.467 0 000 6.46a6.467 6.467 0 006.46 6.46 6.39 6.39 0 003.701-1.169l3.837 3.99a.838.838 0 001.191.023.844.844 0 00.023-1.19zM6.46 1.685a4.78 4.78 0 014.775 4.775 4.78 4.78 0 01-4.775 4.775A4.78 4.78 0 011.685 6.46 4.78 4.78 0 016.46 1.685z"
                  ></path>
                </svg>
              </span>
              <input type="text" placeholder="Search" class="search-input" />
              <span class="form-img-right">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    fill="#3C3737"
                    fill-rule="evenodd"
                    d="M1.014 10.084a.464.464 0 01.45-.576h21.072c.302 0 .523.283.45.576L20.059 21.79a.927.927 0 01-.9.703H4.84a.927.927 0 01-.9-.703L1.015 10.084zm11.736 3.541a.75.75 0 00-1.5 0v4.75a.75.75 0 001.5 0v-4.75zm4.319-.561a.75.75 0 01.448.961l-1.624 4.464a.75.75 0 11-1.41-.513l1.625-4.464a.75.75 0 01.96-.448zm-9.177.448a.75.75 0 10-1.41.513l1.625 4.464a.75.75 0 101.41-.513l-1.625-4.464z"
                    clip-rule="evenodd"
                  ></path>
                  <path
                    stroke="#3C3737"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M18.5 10.5l-4.911-6.422a2 2 0 00-3.178 0L5.5 10.5"
                  ></path>
                </svg>
              </span>
            </form>
          </div>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="container">
        <div class="hero__inner">
          <div class="hero__content">
            <span class="hero__content-top"
              >More than Faster
              <img
                src="./img/strawberry.svg"
                alt="strawberry"
                class="hero__content-top-img"
              />
            </span>
            <h1 class="hero__title">
              Groceries delivered in as little as <span>2 hours </span>
            </h1>
            <p class="hero__desc">
              Grocen atssures fresh grocery every morning to your family without
              getting out in this pandemic.
            </p>
            <div class="hero__content-row">
              <a href="#!" class="hero__action-btn">Order Now</a>
              <div class="hero__process">
                <img
                  src="./img/button-play.svg"
                  alt="play"
                  class="hero__process-img"
                />
                <a href="#!" class="hero__process-link">Order Process</a>
              </div>
            </div>
          </div>

          <div class="hero__media">
            <figure class="media__image">
              <img src="./img/media.png" alt="media" class="media-img" />
            </figure>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
